#cloud-config
users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: users, admin
    home: /home/ubuntu
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-rsa  Chandler
disable_root: false
package_update: true  
packages:
  - wget
  - curl

write_files:
  - content: |
      <?php phpinfo(); ?>
    path: /var/www/html/info.php
    permissions: '0644'
write_files:  # Ab hier wird das gesuchte PHP-File erstellt
- content: |
    <?php
    $ihrname = "Chandler";
    ?>

    <html>
    <head>
    <title><?php echo $ihrname; ?></title>
    </head>
    <body>
    <h1>KN04</h1>
    <br />
    <img src="https://stepankova.s3.amazonaws.com/JanWeinrich.png" alt="Bild aus S3-Bucket">
    </body>
    </html>

  path: /var/www/html/test.php
  permissions: '0644'
runcmd:
  - sudo systemctl restart apache2
